name: iOS CI

on: [push, pull_request]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Flet
      run: pip3 install flet

    - name: Install Kivy toolchain and dependencies
      run: |
        pip3 install git+https://github.com/flet-dev/python-for-ios.git
        HOMEBREW_NO_AUTO_UPDATE=1 brew install autoconf automake libtool pkg-config
        brew link libtool

    - name: Uses toolchain
      run: |
        toolchain build python3 
        export SERIOUS_PYTHON_IOS_DIST='/Users/runner/work/FletSheet/FletSheet/dist'

    - name: Set up Flutter
      run: |
        export FLUTTER_MACOS_URL=https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_3.13.7-stable.zip
        curl $FLUTTER_MACOS_URL -o "$HOME/flutter_macos_stable.zip"
        unzip -qq "$HOME/flutter_macos_stable.zip" -d $HOME
        echo "export PATH=$PATH:$HOME/flutter/bin" >> $GITHUB_ENV
        flutter channel stable
        flutter upgrade
        flutter config --enable-macos-desktop
        flutter doctor

    - name: Build Python toolchain
      run: toolchain build python3 
      env:
        SERIOUS_PYTHON_IOS_DIST: "$(pwd)/dist"

    - name: Build IPA
      run: flet build ipa --template gh:flet-dev/flet-build-template -vv

    - name: Archive IPA
      run: |
        zip -r fletsheet--ios.zip ./build/ipa/Runner.xcarchive

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v3
      with:
        name: IPA
        path: fletsheet--ios.zip
