name: Android CI

on: [push, pull_request]

jobs:
  build-android:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 18
      uses: actions/setup-java@v3
      with:
        java-version: '18'
        distribution: 'temurin' # Eclipse Adoptium

    - name: Install Android Command Line Tools
      run: |
        brew install --cask android-commandlinetools

    - name: Configure Environment Variables
      run: |
        echo "export ANDROID_HOME=$(brew --prefix)/share/android-commandlinetools" >> $GITHUB_ENV
        echo "export PATH=$ANDROID_HOME:$PATH" >> $GITHUB_ENV
        echo "export SDK_MANAGER=$(brew --prefix)/bin/sdkmanager" >> $GITHUB_ENV
        echo "export PATH=$SDK_MANAGER:$PATH" >> $GITHUB_ENV
        echo "export AVD=$(brew --prefix)/bin/avdmanager" >> $GITHUB_ENV
        echo "export PATH=$AVD:$PATH" >> $GITHUB_ENV
        echo "export ADB=$(brew --prefix)/bin/adb" >> $GITHUB_ENV
        echo "export PATH=$ADB:$PATH" >> $GITHUB_ENV

    - name: Accept Licenses
      run: yes | sdkmanager --licenses

    - name: Install Android SDK and Tools
      run: |
        sdkmanager "cmdline-tools;latest" "platforms;android-33" "emulator" "tools" "platform-tools" "ndk;25.2.9519653"

    - name: Install Python and Flet
      run: |
        pip3 install flet
        pip3 install git+https://github.com/flet-dev/python-for-android.git@3.11.6
        pip3 install --upgrade cython

    - name: Set up Flutter
      run: |
        HOMEBREW_NO_AUTO_UPDATE=1 brew install cocoapods
        FLUTTER_MACOS_URL = https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_3.13.7-stable.zip
        curl $FLUTTER_MACOS_URL -o "$HOME/flutter_macos_stable.zip"
        unzip -qq "$HOME/flutter_macos_stable.zip" -d $HOME
        echo "export PATH=$PATH:$HOME/flutter/bin" >> $GITHUB_ENV
        flutter channel stable
        flutter upgrade
        flutter config --enable-macos-desktop
        flutter doctor

    - name: Build APK
      run: flet build apk -vv

    - name: Archive APK
      run: |
        zip -r fletsheet-android.zip ./build/apk/*.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: APK
        path: fletsheet-android.zip
