image:
- Visual Studio 2019
- macOS
- Ubuntu

skip_branch_with_pr: true

skip_commits:
  files:
    - docs/**/*
    - media/**/*
    - "*.md"

stack: python 3.10

environment:
  global:
    FLUTTER_MACOS_URL: https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_3.10.5-stable.zip
    GITHUB_TOKEN:
      secure: J8cyNmJ9GAu0Z+1YM1fqHeP/nWG36aV690f8peUvadrUrEtCWvOsK8xIubGD7hEI

test: off

# Publish artifacts to GitHub Releases on "tag" builds
deploy:
  provider: GitHub
  auth_token: $(GITHUB_TOKEN)
  on:
    APPVEYOR_REPO_TAG: false

#
# Windows package
#
for:
-
  matrix:
    only:
    - image: Visual Studio 2019

  install:
    -  pip install flet
    -  pip install flet-route
    -  pip install openpyxl
    -  flutter upgrade --force

  build_script:
    - flet build windows

  after_build:
  - 7z a fletsheet-windows.zip %CD%\dist\*.exe

  artifacts:
  - path: fletsheet-windows.zip

 

#
# macOS package
#
-
  matrix:
    only:
    - image: macOS

  install:
    - pip install flet
    - pip install flet-route
    - pip install openpyxl
    - HOMEBREW_NO_AUTO_UPDATE=1 brew install cocoapods
    - curl $FLUTTER_MACOS_URL -o "$HOME/flutter_macos_stable.zip"
    - unzip -qq "$HOME/flutter_macos_stable.zip" -d $HOME
    - export PATH="$PATH:$HOME/flutter/bin"
    - flutter channel stable
    - flutter upgrade
    - flutter config --enable-macos-desktop
    - flutter doctor

  build_script:
    - cd client
    - flet build macos

  
  after_build:
  - tar -czvf fletsheet-macos.tar.gz -C dist fletsheet.app
  artifacts:
  - path: fletsheet-macos.tar.gz

 



#
# Linux package
#
-
  matrix:
    only:
    - image: Ubuntu

  install:
    -  pip install flet
    -  pip install flet-route
    -  pip install openpyxl
    -  sudo apt update --allow-releaseinfo-change
    -  sudo apt install -y libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav gstreamer1.0-doc gstreamer1.0-tools gstreamer1.0-x gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 gstreamer1.0-qt5 gstreamer1.0-pulseaudio
    -  flutter upgrade --force

  build_script:
    - cd client
    - flet build linux

  after_build:
  - tar -czvf fletsheet-linux.tar.gz -C dist fletsheet

  artifacts:
  - path: fletsheet-linux.tar.gz

 


 