image:
- Visual Studio 2019
- macOS
- Ubuntu

skip_branch_with_pr: true
stack: python 3.10

environment:
  GITHUB_TOKEN:
    secure: J8cyNmJ9GAu0Z+1YM1fqHeP/nWG36aV690f8peUvadrUrEtCWvOsK8xIubGD7hEI


test: off

# Publish artifacts to GitHub Releases on "tag" builds
deploy:
  provider: GitHub
  auth_token: $(GITHUB_TOKEN)
  on:
    APPVEYOR_REPO_TAG: false

#
# Windows package
#
for:
-
  matrix:
    only:
    - image: Visual Studio 2019

    environment:
    FLUTTER_PATH: C:\projects\fletsheet\sdk\flutter-sdk\bin
    GITHUB_TOKEN:
      secure: J8cyNmJ9GAu0Z+1YM1fqHeP/nWG36aV690f8peUvadrUrEtCWvOsK8xIubGD7hEI

  install:
    - python -m pip install requests
    -  pip install flet
    -  pip install flet-route
    -  pip install openpyxl
  build_script:
    - python paquetes.py 
    - flet build windows

  after_build:
  - 7z a fletsheet-windows.zip %CD%\dist\*.exe

  artifacts:
  - path: fletsheet-windows.zip

 

#
# macOS package
#
-
  matrix:
    only:
    - image: macOS

  install:
    - python -m pip install requests
    -  pip install flet
    -  pip install flet-route
    -  pip install openpyxl
  build_script:
    - python paquetes.py 
    - flet build macos

  
  after_build:
  - tar -czvf fletsheet-macos.tar.gz -C dist fletsheet.app
  artifacts:
  - path: fletsheet-macos.tar.gz

 



#
# Linux package
#
-
  matrix:
    only:
    - image: Ubuntu

  install:
    - python -m pip install requests
    -  pip install flet
    -  pip install flet-route
    -  pip install openpyxl
  build_script:
    - python paquetes.py 
    - flet build linux

  after_build:
  - tar -czvf fletsheet-linux.tar.gz -C dist fletsheet

  artifacts:
  - path: fletsheet-linux.tar.gz

 


 