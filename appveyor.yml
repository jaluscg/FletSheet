image: macos-monterey

skip_branch_with_pr: true

skip_commits:
  files:
    - docs/**/*
    - media/**/*
    - "*.md"

environment:
    PYTHON_STACK: python 3.10
    FLUTTER_MACOS_URL: https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_3.13.7-stable.zip
    GITHUB_TOKEN:
      secure: J8cyNmJ9GAu0Z+1YM1fqHeP/nWG36aV690f8peUvadrUrEtCWvOsK8xIubGD7hEI

    matrix:
    - job_name: Build Python for iOS
      job_group: build_python_darwin
      APPVEYOR_BUILD_WORKER_IMAGE: macos-monterey

    - job_name: Build Python for Android
      job_group: build_python_android
      APPVEYOR_BUILD_WORKER_IMAGE: Ubuntu2004
    
    - job_name: Build Python for Windows
      job_group: build_python_windows
      APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2019

    - job_name: Build Python for Macos
      job_group: build_python_macos
      APPVEYOR_BUILD_WORKER_IMAGE: macos-monterey
    
    - job_name: Build Python for Linux
      job_group: build_python_linux
      APPVEYOR_BUILD_WORKER_IMAGE: Ubuntu2004




test: off

# Publish artifacts to GitHub Releases on "tag" builds
deploy:
  provider: GitHub
  auth_token: $(GITHUB_TOKEN)
  on:
    APPVEYOR_REPO_TAG: false



for:
  # ======================================
  #      Build Python for iOS
  # ======================================

  - matrix:
      only:
        - job_name: Build Python for iOS

    install:
      - pip3 install flet
      - pip3 install flet-route
      - pip3 install openpyxl
      - flutter upgrade --force

      # install Kivy toolchain
      - pip3 list
      - pip3 install git+https://github.com/flet-dev/python-for-ios.git
      - HOMEBREW_NO_AUTO_UPDATE=1 brew install autoconf automake libtool pkg-config
      - brew link libtool

    build_script:
      # build Python 3
      - toolchain build python3
      - ls dist

      # package dist
      - DIST_FILE_NAME=dist/python-ios-dist-v$APPVEYOR_BUILD_VERSION.tar.gz
      - tar -czvf $DIST_FILE_NAME dist/*
      - appveyor PushArtifact $DIST_FILE_NAME -DeploymentName python-dist-macos

    deploy:
      provider: GitHub
      auth_token: $(GITHUB_TOKEN)
      release: $(APPVEYOR_REPO_TAG_NAME)
      artifact: python-dist-macos
      on:
        APPVEYOR_REPO_TAG: true

    test: off

  # ======================================
  #      Build Python for Android
  # ======================================

  - matrix:
      only:
        - job_name: Build Python for Android

    install:
      # update build version
      - pip3 install flet
      - pip3 install flet-route
      - pip3 install openpyxl

      # install NDK
      - export ANDROID_SDK_ROOT="/usr/lib/android-sdk"
      - export NDK_VERSION=25.2.9519653
      - export SDK_VERSION=android-33
      - echo "y" | sdkmanager --install "ndk;$NDK_VERSION" --channel=3 > /dev/null
      - echo "y" | sdkmanager --install "platforms;$SDK_VERSION" > /dev/null

      # install Kivy for Android
      - pip3 install git+https://github.com/flet-dev/python-for-android.git@3.11.6
      - pip3 install --upgrade cython
      - p4a --help
      - p4a create --requirements python3 --arch arm64-v8a --arch armeabi-v7a --arch x86_64 --sdk-dir $ANDROID_SDK_ROOT --ndk-dir $ANDROID_SDK_ROOT/ndk/$NDK_VERSION --dist-name serious_python

      - flutter upgrade --force
      
      # package
      - BUNDLE_NAME=libpythonbundle.so

      # arm64-v8a
      - pushd ~/.local/share/python-for-android/dists/serious_python/_python_bundle__arm64-v8a/_python_bundle
      - zip -r $BUNDLE_NAME .
      - mv $BUNDLE_NAME ../../libs/arm64-v8a
      - popd

      # armeabi-v7a
      - pushd ~/.local/share/python-for-android/dists/serious_python/_python_bundle__armeabi-v7a/_python_bundle
      - zip -r $BUNDLE_NAME .
      - mv $BUNDLE_NAME ../../libs/armeabi-v7a
      - popd

      # armeabi-v7a
      - pushd ~/.local/share/python-for-android/dists/serious_python/_python_bundle__x86_64/_python_bundle
      - zip -r $BUNDLE_NAME .
      - mv $BUNDLE_NAME ../../libs/x86_64
      - popd

      # package all .so files
      - DIST_FILE_NAME=python-android-dist-v$APPVEYOR_BUILD_VERSION.tar.gz
      - pushd ~/.local/share/python-for-android/dists/serious_python/libs
      - tar -czvf $DIST_FILE_NAME *
      - appveyor PushArtifact $DIST_FILE_NAME -DeploymentName python-dist-android
      - popd

    deploy:
      provider: GitHub
      auth_token: $(GITHUB_TOKEN)
      release: $(APPVEYOR_REPO_TAG_NAME)
      artifact: python-dist-android
      on:
        APPVEYOR_REPO_TAG: true

#
# Windows package
#


  - matrix:
      only:
        - job_name: Build Python for Windows

    install:
      -  pip install flet
      -  pip install flet-route
      -  pip install openpyxl
      -  flutter upgrade --force

    build_script:
      - flet build windows

    after_build:
    - 7z a fletsheet-windows.zip %CD%\dist\*.exe

    artifacts:
    - path: fletsheet-windows.zip

 

#
# macOS package
#

  - matrix:
      only:
        - job_name: Build Python for Macos


    install:
      - pip install flet
      - pip install flet-route
      - pip install openpyxl
      - HOMEBREW_NO_AUTO_UPDATE=1 brew install cocoapods
      - curl $FLUTTER_MACOS_URL -o "$HOME/flutter_macos_stable.zip"
      - unzip -qq "$HOME/flutter_macos_stable.zip" -d $HOME
      - export PATH="$PATH:$HOME/flutter/bin"
      - flutter channel stable
      - flutter upgrade
      - pod update
      - flutter config --enable-macos-desktop
      - flutter doctor

    build_script:
      - flet build macos

    
    after_build:
    - tar -czvf fletsheet-macos.tar.gz -C dist fletsheet.app
    artifacts:
    - path: fletsheet-macos.tar.gz

  



#
# Linux package
#

  - matrix:
      only:
        - job_name: Build Python for Linux

    install:
      -  pip install flet
      -  pip install flet-route
      -  pip install openpyxl
      #-  sudo apt update --allow-releaseinfo-change
      -  apt install libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav gstreamer1.0-doc gstreamer1.0-tools gstreamer1.0-x gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 gstreamer1.0-qt5 gstreamer1.0-pulseaudio
      -  flutter upgrade --force

    build_script:
      - flet build linux

    after_build:
    - tar -czvf fletsheet-linux.tar.gz -C dist fletsheet

    artifacts:
    - path: fletsheet-linux.tar.gz

  


 