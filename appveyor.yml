image:
- Visual Studio 2019
- macOS
- Ubuntu

skip_branch_with_pr: true
stack: python 3.10

environment:
  GITHUB_TOKEN:
    secure: J8cyNmJ9GAu0Z+1YM1fqHeP/nWG36aV690f8peUvadrUrEtCWvOsK8xIubGD7hEI

install:
- "pip install -r requirements.txt"

build_script:
- "flet build windows --output dist/windows"
- "flet build macos --output dist/macos"
- "flet build linux --output dist/linux"
- "flet build apk --output dist/android"

test: off

# Publish artifacts to GitHub Releases on "tag" builds
deploy:
  provider: GitHub
  auth_token: $(GITHUB_TOKEN)
  on:
    APPVEYOR_REPO_TAG: false

#
#   Windows package
# 
for:
-
  matrix:
    only:
    - image: Visual Studio 2019

  after_build:
  - 7z a fletsheet-windows.zip %CD%\dist\windows\*.exe

  artifacts:
  - path: fletsheet-windows.zip

#
#   macOS package
# 
-
  matrix:
    only:
    - image: macOS

  after_build:
  - tar -czvf fletsheet-macos.tar.gz -C dist/macos fletsheet.app

  artifacts:
  - path: fletsheet-macos.tar.gz

#
#   Linux package
# 
-
  matrix:
    only:
    - image: Ubuntu

  after_build:
  - tar -czvf fletsheet-linux.tar.gz -C dist/linux fletsheet

  artifacts:
  - path: fletsheet-linux.tar.gz

#
#   Android package
# 
-
  matrix:
    only:
    - image: Visual Studio 2019  # or the appropriate image for building Android packages

  after_build:
  - "mv dist/android/output.apk fletsheet-android.apk"  # Replace 'output.apk' with the actual name of the generated APK

  artifacts:
  - path: fletsheet-android.apk