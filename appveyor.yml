skip_branch_with_pr: true
stack: python 3.10

environment:
  GITHUB_TOKEN:
    secure:  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


install:
- "pip install -r requirements.txt"

test: off

# Publish artifacts to GitHub Releases on "tag" builds
deploy:
  provider: GitHub
  auth_token: $(GITHUB_TOKEN)
  on:
    APPVEYOR_REPO_TAG: true

#
#   Windows, macOS, and Linux packaging
# 
for:
  -
    matrix:
      only:
        - image: Visual Studio 2019

    build_script:
      - flet pack main.py --name fletsheet --icon assets/icons/icon.ico --product-name fletsheet --product-version "0.0.1" --copyright "MIT License"

    after_build:
      - 7z a fletsheet-windows.zip %CD%\dist\*.exe

    artifacts:
      - path: fletsheet-windows.zip

  -
    matrix:
      only:
        - image: macOS
  
    build_script:
      - flet pack main.py --name fletsheet --icon assets/icons/icon.jpg --product-name fletsheet --product-version "0.0.1" --copyright "MIT License"

    after_build:
      - tar -czvf fletsheet-macos.tar.gz -C dist fletsheet.app

    artifacts:
      - path: fletsheet-macos.tar.gz

  -
    matrix:
      only:
        - image: Ubuntu

    build_script:
      - flet pack main.py --name fletsheet --icon assets/icons/icon.ico --product-name fletsheet --product-version "0.0.1" --copyright "MIT License"

    after_build:
      - tar -czvf fletsheet-linux.tar.gz -C dist fletsheet

    artifacts:
      - path: fletsheet-linux.tar.gz